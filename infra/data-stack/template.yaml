AWSTemplateFormatVersion: "2010-09-09"
Description: Lovv stateful data stack outside the AWS SAM application stack.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z][a-z0-9-]{1,20}$"
    Description: Lowercase environment name used in resource names and SSM parameter paths.
  LovvDbName:
    Type: String
    Default: lovv_dev
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{1,63}$"
    Description: MySQL database name.
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance class.
  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    Description: RDS allocated storage in GiB.
  DBMasterUsername:
    Type: String
    Default: lovv_admin
    NoEcho: true
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{1,31}$"
    Description: RDS master username. Password is generated by RDS managed master user secret.
  RDSDeletionProtection:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Keep true for production-like environments.
  VpcCidr:
    Type: String
    Default: 10.40.0.0/16
    Description: Development VPC CIDR for the data stack.
  PrivateSubnetACidr:
    Type: String
    Default: 10.40.10.0/24
    Description: Development private subnet A CIDR.
  PrivateSubnetCCidr:
    Type: String
    Default: 10.40.20.0/24
    Description: Development private subnet C CIDR.
  DevMysqlIngressCidr:
    Type: String
    Default: 10.40.0.0/16
    Description: CIDR allowed to connect to MySQL in development.

Conditions:
  EnableRDSDeletionProtection: !Equals [!Ref RDSDeletionProtection, "true"]

Resources:
  LovvDevVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-vpc
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  LovvPrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LovvDevVPC
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-private-a
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: Tier
          Value: private

  LovvPrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LovvDevVPC
      CidrBlock: !Ref PrivateSubnetCCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-private-c
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: Tier
          Value: private

  LovvRDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub Lovv ${EnvName} RDS MySQL access
      VpcId: !Ref LovvDevVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref DevMysqlIngressCidr
          Description: Development MySQL access CIDR
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-rds-sg
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  LovvDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub Lovv ${EnvName} RDS subnet group
      SubnetIds:
        - !Ref LovvPrivateSubnetA
        - !Ref LovvPrivateSubnetC

  LovvRDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: !Sub lovv-${EnvName}-mysql
      DBName: !Ref LovvDbName
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageEncrypted: true
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      CopyTagsToSnapshot: true
      DeletionProtection: !If [EnableRDSDeletionProtection, true, false]
      DBSubnetGroupName: !Ref LovvDBSubnetGroup
      VPCSecurityGroups:
        - !Ref LovvRDSSecurityGroup
      MasterUsername: !Ref DBMasterUsername
      ManageMasterUserPassword: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  UserEventLogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_user_event_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: event_type_day
          AttributeType: S
        - AttributeName: recommendation_request_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RequestLookup
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3EventTypeDaily
          KeySchema:
            - AttributeName: event_type_day
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI4RecommendationLookup
          KeySchema:
            - AttributeName: recommendation_request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  AgentRunsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_agent_runs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: agent_run_id
          AttributeType: S
        - AttributeName: recommendation_request_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RequestLookup
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2AgentRunLookup
          KeySchema:
            - AttributeName: agent_run_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI4RecommendationLookup
          KeySchema:
            - AttributeName: recommendation_request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  FestivalVerifyCacheTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_festival_verify_cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  AsyncJobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_async_jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  ApiLogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_api_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RequestLookup
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  ContentDocumentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_content_documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  VisitorStatisticsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_visitor_statistics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  ImageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub lovv-image-${EnvName}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireTemporaryUploads
            Status: Enabled
            Prefix: tmp/
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  RDSHostParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/rds/host
      Type: String
      Value: !GetAtt LovvRDSInstance.Endpoint.Address

  VpcIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/vpc_id
      Type: String
      Value: !Ref LovvDevVPC

  PrivateSubnetAParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/private_subnet_a
      Type: String
      Value: !Ref LovvPrivateSubnetA

  PrivateSubnetCParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/private_subnet_c
      Type: String
      Value: !Ref LovvPrivateSubnetC

  RDSSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/rds_security_group
      Type: String
      Value: !Ref LovvRDSSecurityGroup

  RDSDatabaseNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/rds/db_name
      Type: String
      Value: !Ref LovvDbName

  RDSSecretArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/rds/secret_arn
      Type: String
      Value: !GetAtt LovvRDSInstance.MasterUserSecret.SecretArn

  UserEventLogsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/user_event_logs
      Type: String
      Value: !Ref UserEventLogsTable

  AgentRunsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/agent_runs
      Type: String
      Value: !Ref AgentRunsTable

  FestivalVerifyCacheTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/festival_verify_cache
      Type: String
      Value: !Ref FestivalVerifyCacheTable

  AsyncJobsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/async_jobs
      Type: String
      Value: !Ref AsyncJobsTable

  ApiLogsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/api_logs
      Type: String
      Value: !Ref ApiLogsTable

  ContentDocumentsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/content_documents
      Type: String
      Value: !Ref ContentDocumentsTable

  VisitorStatisticsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/visitor_statistics
      Type: String
      Value: !Ref VisitorStatisticsTable

  ImageBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/s3/image_bucket
      Type: String
      Value: !Ref ImageBucket

Outputs:
  VpcId:
    Description: Development VPC ID.
    Value: !Ref LovvDevVPC
  PrivateSubnetA:
    Description: Development private subnet A ID.
    Value: !Ref LovvPrivateSubnetA
  PrivateSubnetC:
    Description: Development private subnet C ID.
    Value: !Ref LovvPrivateSubnetC
  RDSSecurityGroup:
    Description: Development RDS security group ID.
    Value: !Ref LovvRDSSecurityGroup
  RDSHost:
    Description: RDS endpoint host.
    Value: !GetAtt LovvRDSInstance.Endpoint.Address
  RDSDatabaseName:
    Description: RDS database name.
    Value: !Ref LovvDbName
  RDSSecretArn:
    Description: RDS managed master user secret ARN.
    Value: !GetAtt LovvRDSInstance.MasterUserSecret.SecretArn
  ImageBucketName:
    Description: S3 image bucket name.
    Value: !Ref ImageBucket
  UserEventLogsTableName:
    Value: !Ref UserEventLogsTable
  AgentRunsTableName:
    Value: !Ref AgentRunsTable
  FestivalVerifyCacheTableName:
    Value: !Ref FestivalVerifyCacheTable
  AsyncJobsTableName:
    Value: !Ref AsyncJobsTable
  ApiLogsTableName:
    Value: !Ref ApiLogsTable
  ContentDocumentsTableName:
    Value: !Ref ContentDocumentsTable
  VisitorStatisticsTableName:
    Value: !Ref VisitorStatisticsTable
